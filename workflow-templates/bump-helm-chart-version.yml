name: Bump Helm Chart Version

# Version is computed by GitVersion from git history + commit messages, and
# written to both `version` and `appVersion` in Chart.yaml.
#
# Requires a GitVersion.yml at the repo root. Use the recommended template:
#   https://github.com/stratsys/.github-private/blob/main/templates/GitVersion.yml
#
# Commit message conventions (from that template):
#   breaking: …     →  major
#   feat: …         →  minor
#   fix: …          →  patch
#   anything else   →  patch (branch default)
#   [skip version]  →  workflow exits early

on:
  push:
    branches:
      - main
      - master

jobs:
  bump:
    uses: stratsys/.github-private/.github/workflows/bump-helm-chart-version.yml@main
    with:
      chart-path: 'helm'
    secrets: inherit
